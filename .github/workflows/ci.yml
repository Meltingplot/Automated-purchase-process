name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    paths-ignore:
      - "**.md"
      - "**.csv"
      - ".editorconfig"
      - ".gitignore"
      - ".gitattributes"
      - "license.txt"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
          pytest tests/ -v --tb=short

  linters:
    name: Linters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Download Semgrep rules
        run: git clone --depth 1 https://github.com/frappe/semgrep-rules.git frappe-semgrep-rules

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep ci --config ./frappe-semgrep-rules/rules --config r/python.lang.correctness

  integration:
    name: Frappe Integration (v15)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379

      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379

      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -proot"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=3

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml', '**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mariadb-client \
            libmagic1 \
            tesseract-ocr \
            wkhtmltopdf \
            xvfb \
            libfontconfig

      - name: Setup bench
        run: |
          pip install frappe-bench
          bench init --skip-redis-config-generation --skip-assets --python "$(which python)" ~/frappe-bench
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL character_set_server = 'utf8mb4'"
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL collation_server = 'utf8mb4_unicode_ci'"

      - name: Install apps and create site
        working-directory: /home/runner/frappe-bench
        run: |
          bench set-config -g redis_cache redis://127.0.0.1:13000
          bench set-config -g redis_queue redis://127.0.0.1:11000
          bench set-config -g redis_socketio redis://127.0.0.1:11000
          bench get-app erpnext --branch version-15
          bench get-app procurement_ai $GITHUB_WORKSPACE
          bench setup requirements --dev
          bench new-site test-site \
            --db-root-password root \
            --admin-password admin \
            --no-mariadb-socket
          bench --site test-site install-app erpnext
          bench --site test-site install-app procurement_ai
          bench use test-site
        env:
          CI: "Yes"

      - name: Build assets
        working-directory: /home/runner/frappe-bench
        run: bench build

      - name: Run bench migrate
        working-directory: /home/runner/frappe-bench
        run: bench migrate

      - name: Verify module imports
        working-directory: /home/runner/frappe-bench
        run: bench execute procurement_ai.tests.test_module_imports.run_all

      - name: Run integration tests
        working-directory: /home/runner/frappe-bench
        run: bench execute procurement_ai.tests.test_frappe_integration.run_all
